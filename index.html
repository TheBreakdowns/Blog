<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBlog - Breakdowns</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e3e6ed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR PANEL (KIRI) --- */
        .sidebar {
            width: 100%;
            background-color: #1e222b;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #2a2f3d;
            flex-shrink: 0;
        }

        .server-header {
            display: none;
        }

        .channel-list {
            display: flex;
            padding: 10px;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .channel-category {
            display: none;
        }

        .channel-item {
            padding: 8px 14px;
            background-color: #13161c;
            border-radius: 6px;
            cursor: pointer;
            color: #9da5b4;
            font-size: 13px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background-color: #2c3241;
            color: #fff;
        }

        /* Efek Menu Aktif Lebih Nyata */
        .channel-item.active {
            background-color: #4f46e5;
            color: #fff;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4);
            border-color: #6366f1;
        }

        .channel-item::before {
            content: "# ";
            font-weight: bold;
            color: #656e7e;
        }

        .channel-item.active::before {
            color: #fff;
        }

        /* KOTAK PROFIL GAYA DISCORD + SOSMED */
        .user-profile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 15px;
            background-color: #171a21;
            border-top: 1px solid #2a2f3d;
            border-bottom: 1px solid #2a2f3d;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-container {
            position: relative;
            line-height: 0;
        }

        /* Menggunakan foto profil dari link github kamu */
        .avatar-img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4f46e5;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 11px;
            height: 11px;
            background-color: #10b981;
            border: 2px solid #171a21;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
        }

        .custom-status {
            font-size: 11px;
            color: #10b981;
        }

        /* Sosmed Icons */
        .profile-socials {
            display: flex;
            gap: 12px;
        }

        .social-link {
            color: #9da5b4;
            font-size: 15px;
            transition: color 0.2s;
            text-decoration: none;
        }

        .social-link:hover {
            color: #4f46e5;
        }

        /* --- MAIN CHAT AREA --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #13161c;
        }

        .chat-header {
            padding: 12px 15px;
            border-bottom: 1px solid #2a2f3d;
            background-color: #13161c;
        }

        .chat-header h2 {
            font-size: 15px;
            color: #fff;
        }

        .chat-header p {
            font-size: 12px;
            color: #8a94a6;
            margin-top: 2px;
        }

        .message-list {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-group {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.25s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .msg-author {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }

        .msg-time {
            font-size: 11px;
            color: #656e7e;
        }

        .msg-text {
            color: #d1d5db;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .spotify-container {
            margin-top: 8px;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            line-height: 0;
        }

        .spotify-player {
            border: none;
            width: 100%;
            height: 380px;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .reaction-badge {
            background-color: #1e222b;
            border: 1px solid #2a2f3d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #9da5b4;
            user-select: none;
        }

        /* --- 🖥️ LAYOUT DEKSTOP --- */
        @media (min-width: 769px) {
            body {
                flex-direction: row;
                height: 100vh;
            }

            .sidebar {
                width: 260px;
                height: 100%;
                border-right: 1px solid #2a2f3d;
                border-bottom: none;
            }

            .server-header {
                display: block;
            }

            .channel-list {
                flex-direction: column;
                overflow-x: hidden;
                overflow-y: auto;
                white-space: normal;
                padding: 15px 8px;
            }

            .channel-category {
                display: block;
            }

            .channel-item {
                margin-bottom: 4px;
                width: 100%;
            }

            .user-profile {
                border-top: 1px solid #2a2f3d;
                border-bottom: none;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 15px;
            }

            .profile-socials {
                width: 100%;
                justify-content: flex-start;
                padding-left: 2px;
                gap: 16px;
            }

            .message-list {
                overflow-y: auto;
                padding: 20px;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="server-header">🎮 Musik & Gaming Log</div>
        
        <div class="channel-list">
            <div class="channel-category">Kategori Blog</div>
            <div class="channel-item active" onclick="switchChannel('game-review', 'Tempat curhat dan review jujur seputar game.')">game-review</div>
            <div class="channel-item" onclick="switchChannel('now-playing', 'Koleksi playlist andalan pas lagi mabar.')">now-playing</div>
            <div class="channel-item" onclick="switchChannel('setup-gaming', 'Update komponen PC dan perintilan meja.')">setup-gaming</div>
        </div>

        <div class="user-profile">
            <div class="profile-left">
                <div class="avatar-container">
                    <img class="avatar-img" src="https://raw.githubusercontent.com/breakdowns/website/refs/heads/master/images/me.jpg" alt="Breakdowns">
                    <div class="status-dot"></div>
                </div>
                <div class="user-info">
                    <span class="username">Breakdowns</span>
                    <span class="custom-status">🎧 Jamming on Spotify</span>
                </div>
            </div>
            <div class="profile-socials">
                <a href="http://googleusercontent.com/instagram.com/0" target="_blank" class="social-link" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="http://googleusercontent.com/discord.com/0" target="_blank" class="social-link" title="Discord Server"><i class="fab fa-discord"></i></a>
                <a href="https://github.com/breakdowns" target="_blank" class="social-link" title="GitHub"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h2 id="current-channel-name"># game-review</h2>
            <p id="current-channel-desc">| Tempat curhat dan review jujur seputar game yang lagi ditamatin.</p>
        </div>

        <div class="message-list" id="message-container"></div>
    </div>

    <script>
        const blogData = {
            'game-review': [
                {
                    time: "Hari ini pukul 14:20",
                    text: "Baru main game Cyberpunk selama 3 jam nonstop hari ini. Sumpah, grafik 10/10 setelah update terbaru, tapi mekanik combat-nya masih agak kaku dikit di awal. Kalau lu suka tipe game eksplorasi kota distopia distrik malam, wajib angkat sih pas lagi diskon!",
                    likes: 12,
                    type: "text"
                },
                {
                    time: "Kemarin pukul 18:00",
                    text: "Lagi nyoba grinding level di game sebelah, baru sadar boss-nya susah banget kalau gak bawa item healing yang pas. Ada saran build item yang oke buat pemula?",
                    likes: 7,
                    type: "text"
                }
            ],
            'now-playing': [
                {
                    time: "2 hari yang lalu pukul 21:05",
                    text: "Ini playlist andalan gw kalau lagi push rank atau sekadar nyantai di room Discord. Musiknya dapet banget energinya, langsung dengerin aja di bawah:",
                    likes: 35,
                    type: "spotify",
                    embedUrl: "https://open.spotify.com/embed/playlist/38xujwdY9rSGTDm3eqzbgL" 
                }
            ],
            'setup-gaming': [
                {
                    time: "3 hari yang lalu",
                    text: "Kabel manajemen di bawah meja gw udah mirip mi goreng instan. Perlu dirapiin weekend ini sebelum ada tikus bersarang pfftt..",
                    likes: 5,
                    type: "text"
                }
            ]
        };

        let currentChannel = 'game-review';

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = ''; 

            const messages = blogData[currentChannel] || [];

            messages.forEach((msg, index) => {
                let embedHTML = '';
                if (msg.type === 'spotify') {
                    embedHTML = `
                        <div class="spotify-container">
                            <iframe class="spotify-player" src="${msg.embedUrl}" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                        </div>
                    `;
                }

                const msgHTML = `
                    <div class="message-group">
                        <img class="msg-avatar-img" src="https://raw.githubusercontent.com/breakdowns/website/refs/heads/master/images/me.jpg" alt="BD">
                        <div class="msg-content-wrapper">
                            <div class="msg-header">
                                <span class="msg-author">Breakdowns</span>
                                <span class="msg-time">${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                            ${embedHTML}
                            <div class="reactions">
                                <button class="reaction-badge" onclick="addLike(${index})">🔥 <span id="like-count-${index}">${msg.likes}</span></button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += msgHTML;
            });
        }

        function switchChannel(channelKey, description) {
            currentChannel = channelKey;
            
            document.getElementById('current-channel-name').innerText = `# ${channelKey}`;
            document.getElementById('current-channel-desc').innerText = `| ${description}`;

            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
                if(item.getAttribute('onclick').includes(`'${channelKey}'`)) {
                    item.classList.add('active');
                }
            });

            renderMessages();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function addLike(index) {
            blogData[currentChannel][index].likes += 1;
            document.getElementById(`like-count-${index}`).innerText = blogData[currentChannel][index].likes;
        }

        renderMessages();
    </script>
</body>
</html>
