<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBlog - Breakdowns</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e3e6ed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR PANEL --- */
        .sidebar {
            width: 260px;
            background-color: #1e222b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2f3d;
            flex-shrink: 0;
        }

        .server-header {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #2a2f3d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            color: #fff;
        }

        .channel-list {
            flex: 1;
            padding: 15px 8px;
            overflow-y: auto;
        }

        .channel-category {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a94a6;
            font-weight: bold;
            margin-bottom: 8px;
            padding-left: 8px;
            letter-spacing: 0.5px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #9da5b4;
            text-decoration: none;
            margin-bottom: 4px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        .channel-item:hover, .channel-item.active {
            background-color: #2c3241;
            color: #fff;
        }

        .channel-item::before {
            content: "#";
            margin-right: 8px;
            font-weight: bold;
            color: #656e7e;
        }

        .channel-item.active::before {
            color: #4f46e5;
        }

        .user-profile {
            padding: 12px;
            background-color: #171a21;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #2a2f3d;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border: 2px solid #171a21;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .custom-status {
            font-size: 11px;
            color: #10b981;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        /* --- MAIN CHAT AREA --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #13161c;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2f3d;
            background-color: #13161c;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .chat-header h2 {
            font-size: 16px;
            color: #fff;
        }

        .chat-header p {
            font-size: 13px;
            color: #8a94a6;
        }

        .message-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        .message-group {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.25s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            font-size: 14px;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            overflow: hidden; /* Mencegah konten keluar jalur */
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .msg-author {
            font-weight: 600;
            color: #fff;
            font-size: 14.5px;
        }

        .msg-time {
            font-size: 11px;
            color: #656e7e;
        }

        .msg-text {
            color: #d1d5db;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        /* PERBAIKAN LEBAR PLAYLIST SPOTIFY */
        .spotify-container {
            margin-top: 8px;
            max-width: 450px; /* Batasi lebar maksimal kotak musik biar gak melebar kaku */
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            line-height: 0;
        }

        .spotify-player {
            border: none;
            width: 100%;
            height: 380px;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .reaction-badge {
            background-color: #1e222b;
            border: 1px solid #2a2f3d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #9da5b4;
            transition: all 0.2s;
            user-select: none;
        }

        .reaction-badge:hover {
            background-color: #2c3241;
            border-color: #4f46e5;
            color: #fff;
        }

        /* --- 📱 PERBAIKAN RESPONSIVE LAYOUT (MENCAKUP LAYAR MIRING / LANDSCAPE) --- */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #2a2f3d;
            }

            .server-header {
                display: none;
            }

            /* Profil dipaksa tampil rapi dan presisi di bawah bar menu kategori */
            .user-profile {
                border-top: 1px solid #2a2f3d;
                border-bottom: 1px solid #2a2f3d;
                padding: 8px 15px;
            }

            .channel-list {
                display: flex;
                padding: 10px 10px 5px 10px;
                gap: 8px;
                overflow-x: auto;
                white-space: nowrap;
            }

            .channel-category {
                display: none;
            }

            .channel-item {
                margin-bottom: 0;
                padding: 6px 12px;
                background-color: #13161c;
                font-size: 13px;
            }

            .chat-header {
                padding: 12px 15px;
            }

            .message-list {
                padding: 15px;
                gap: 16px;
            }

            .spotify-container {
                max-width: 100%; /* Di HP, penuhi seluruh lebar balon chat */
            }
            
            .spotify-player {
                height: 380px; /* Mempertahankan list lagu penuh */
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR LEFT -->
    <div class="sidebar">
        <div class="server-header">🎮 Musik & Gaming Log</div>
        
        <div class="channel-list">
            <div class="channel-category">Kategori Blog</div>
            <div class="channel-item active" onclick="switchChannel('game-review', 'Tempat curhat dan review jujur seputar game.')">game-review</div>
            <div class="channel-item" onclick="switchChannel('now-playing', 'Koleksi playlist andalan pas lagi mabar.')">now-playing</div>
            <div class="channel-item" onclick="switchChannel('setup-gaming', 'Update komponen PC dan perintilan meja.')">setup-gaming</div>
        </div>

        <!-- PROFILE AREA -->
        <div class="user-profile">
            <div class="avatar-container">
                <div class="avatar">BD</div>
                <div class="status-dot"></div>
            </div>
            <div class="user-info">
                <span class="username">Breakdowns</span>
                <span class="custom-status">🎧 Jamming on Spotify</span>
            </div>
        </div>
    </div>

    <!-- CHAT WINDOW RIGHT -->
    <div class="chat-area">
        <div class="chat-header">
            <h2 id="current-channel-name"># game-review</h2>
            <p id="current-channel-desc">| Tempat curhat dan review jujur seputar game yang lagi ditamatin.</p>
        </div>

        <!-- CONTAINER PESAN -->
        <div class="message-list" id="message-container"></div>
    </div>

    <!-- --- JAVASCRIPT ENGINE --- -->
    <script>
        const blogData = {
            'game-review': [
                {
                    time: "Hari ini pukul 14:20",
                    text: "Baru main game Cyberpunk selama 3 jam nonstop hari ini. Sumpah, grafik 10/10 setelah update terbaru, tapi mekanik combat-nya masih agak kaku dikit di awal. Kalau lu suka tipe game eksplorasi kota distopia distrik malam, wajib angkat sih pas lagi diskon!",
                    likes: 12,
                    type: "text"
                },
                {
                    time: "Kemarin pukul 18:00",
                    text: "Lagi nyoba grinding level di game sebelah, baru sadar boss-nya susah banget kalau gak bawa item healing yang pas. Ada saran build item yang oke buat pemula?",
                    likes: 7,
                    type: "text"
                }
            ],
            'now-playing': [
                {
                    time: "2 hari yang lalu pukul 21:05",
                    text: "Ini playlist andalan gw kalau lagi push rank atau sekadar nyantai di room Discord. Musiknya dapet banget energinya, langsung dengerin aja di bawah:",
                    likes: 35,
                    type: "spotify",
                    embedUrl: "https://open.spotify.com/embed/playlist/38xujwdY9rSGTDm3eqzbgL" 
                }
            ],
            'setup-gaming': [
                {
                    time: "3 hari yang lalu",
                    text: "Kabel manajemen di bawah meja gw udah mirip mi goreng instan. Perlu dirapiin weekend ini sebelum ada tikus bersarang pfftt..",
                    likes: 5,
                    type: "text"
                }
            ]
        };

        let currentChannel = 'game-review';

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = ''; 

            const messages = blogData[currentChannel] || [];

            messages.forEach((msg, index) => {
                let embedHTML = '';
                if (msg.type === 'spotify') {
                    embedHTML = `
                        <div class="spotify-container">
                            <iframe class="spotify-player" src="${msg.embedUrl}" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                        </div>
                    `;
                }

                const msgHTML = `
                    <div class="message-group">
                        <div class="msg-avatar">BD</div>
                        <div class="msg-content-wrapper">
                            <div class="msg-header">
                                <span class="msg-author">Breakdowns</span>
                                <span class="msg-time">${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                            ${embedHTML}
                            <div class="reactions">
                                <button class="reaction-badge" onclick="addLike(${index})">🔥 <span id="like-count-${index}">${msg.likes}</span></button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += msgHTML;
            });

            container.scrollTop = 0; 
        }

        function switchChannel(channelKey, description) {
            currentChannel = channelKey;
            
            document.getElementById('current-channel-name').innerText = `# ${channelKey}`;
            document.getElementById('current-channel-desc').innerText = `| ${description}`;

            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
                if(item.getAttribute('onclick').includes(`'${channelKey}'`)) {
                    item.classList.add('active');
                }
            });

            renderMessages();
        }

        function addLike(index) {
            blogData[currentChannel][index].likes += 1;
            document.getElementById(`like-count-${index}`).innerText = blogData[currentChannel][index].likes;
        }

        renderMessages();
    </script>
</body>
    </html>
