<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBlog - Musik & Gaming</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e3e6ed;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR PANEL (KIRI) --- */
        .sidebar {
            width: 260px;
            background-color: #1e222b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2f3d;
        }

        .server-header {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #2a2f3d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            color: #fff;
        }

        .channel-list {
            flex: 1;
            padding: 15px 8px;
            overflow-y: auto;
        }

        .channel-category {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a94a6;
            font-weight: bold;
            margin-bottom: 8px;
            padding-left: 8px;
            letter-spacing: 0.5px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #9da5b4;
            text-decoration: none;
            margin-bottom: 4px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        .channel-item:hover, .channel-item.active {
            background-color: #2c3241;
            color: #fff;
        }

        .channel-item::before {
            content: "#";
            margin-right: 8px;
            font-weight: bold;
            color: #656e7e;
        }

        .channel-item.active::before {
            color: #4f46e5;
        }

        .user-profile {
            padding: 12px;
            background-color: #171a21;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #2a2f3d;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border: 2px solid #171a21;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .custom-status {
            font-size: 11px;
            color: #10b981;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        /* --- MAIN CHAT AREA (KANAN) --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #13161c;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2f3d;
            background-color: #13161c;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .chat-header h2 {
            font-size: 16px;
            color: #fff;
        }

        .chat-header p {
            font-size: 13px;
            color: #8a94a6;
        }

        .message-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; /* Jarak aman di bawah */
        }

        .message-group {
            display: flex;
            gap: 15px;
            animation: fadeIn 0.25s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .msg-author {
            font-weight: 600;
            color: #fff;
            font-size: 15px;
        }

        .msg-time {
            font-size: 11px;
            color: #656e7e;
        }

        .msg-text {
            color: #d1d5db;
            font-size: 14.5px;
            line-height: 1.5;
            max-width: 800px;
        }

        .spotify-player {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            max-width: 450px;
            border: none;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .reaction-badge {
            background-color: #1e222b;
            border: 1px solid #2a2f3d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #9da5b4;
            transition: all 0.2s;
            user-select: none;
        }

        .reaction-badge:hover {
            background-color: #2c3241;
            border-color: #4f46e5;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="server-header">🎮 Musik & Gaming Log</div>
        
        <div class="channel-list">
            <div class="channel-category">Kategori Blog</div>
            <div class="channel-item active" onclick="switchChannel('game-review', 'Tempat curhat dan review jujur seputar game yang lagi ditamatin.')">game-review</div>
            <div class="channel-item" onclick="switchChannel('now-playing', 'Koleksi audio track gokil dan playlist andalan pas lagi mabar.')">now-playing</div>
            <div class="channel-item" onclick="switchChannel('setup-gaming', 'Update komponen PC, perintilan meja, dan keluhan manajemen kabel.')">setup-gaming</div>
        </div>

        <div class="user-profile">
            <div class="avatar-container">
                <div class="avatar">GG</div>
                <div class="status-dot"></div>
            </div>
            <div class="user-info">
                <span class="username">GamerGokil</span>
                <span class="custom-status">🎧 Listening to Playlist</span>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h2 id="current-channel-name"># game-review</h2>
            <p id="current-channel-desc">| Tempat curhat dan review jujur seputar game yang lagi ditamatin.</p>
        </div>

        <div class="message-list" id="message-container"></div>
    </div>

    <script>
        // DATA BLOG KAMU (Edit bagian ini untuk menambah/mengganti isi chat sesukamu)
        const blogData = {
            'game-review': [
                {
                    time: "Hari ini pukul 14:20",
                    text: "Baru main game Cyberpunk selama 3 jam nonstop hari ini. Sumpah, grafik 10/10 setelah update terbaru, tapi mekanik combat-nya masih agak kaku dikit di awal. Kalau lu suka tipe game eksplorasi kota distopia distrik malam, wajib angkat sih pas lagi diskon!",
                    likes: 12,
                    type: "text"
                },
                {
                    time: "Kemarin pukul 18:00",
                    text: "Lagi nyoba grinding level di game sebelah, baru sadar boss-nya susah banget kalau gak bawa item healing yang pas. Ada saran build item yang oke buat pemula?",
                    likes: 7,
                    type: "text"
                }
            ],
            'now-playing': [
                {
                    time: "2 hari yang lalu pukul 21:05",
                    text: "Ini playlist andalan gw kalau lagi push rank atau sekadar nyantai di room Discord. Musiknya dapet banget energinya, langsung dengerin aja di bawah:",
                    likes: 35,
                    type: "spotify",
                    // Menggunakan link playlist Spotify yang kamu berikan
                    embedUrl: "https://open.spotify.com/playlist/38xujwdY9rSGTDm3eqzbgL?si=87dliiEATumsO86u6HEFOQ&pi=NWpQxsOgR5-pl" 
                }
            ],
            'setup-gaming': [
                {
                    time: "3 hari yang lalu",
                    text: "Kabel manajemen di bawah meja gw udah mirip mi goreng instan. Perlu dirapiin weekend ini sebelum ada tikus bersarang pfftt..",
                    likes: 5,
                    type: "text"
                }
            ]
        };

        let currentChannel = 'game-review';

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = ''; 

            const messages = blogData[currentChannel] || [];

            messages.forEach((msg, index) => {
                let embedHTML = '';
                if (msg.type === 'spotify') {
                    // Rendering Iframe Spotify Player Resmi
                    embedHTML = `
                        <iframe class="spotify-player" src="${msg.embedUrl}" width="100%" height="380" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
                    `;
                }

                const msgHTML = `
                    <div class="message-group">
                        <div class="msg-avatar">GG</div>
                        <div class="msg-content-wrapper">
                            <div class="msg-header">
                                <span class="msg-author">GamerGokil</span>
                                <span class="msg-time">${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                            ${embedHTML}
                            <div class="reactions">
                                <button class="reaction-badge" onclick="addLike(${index})">🔥 <span id="like-count-${index}">${msg.likes}</span></button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += msgHTML;
            });

            container.scrollTop = 0; // Mulai dari atas saat ganti kategori
        }

        function switchChannel(channelKey, description) {
            currentChannel = channelKey;
            
            document.getElementById('current-channel-name').innerText = `# ${channelKey}`;
            document.getElementById('current-channel-desc').innerText = `| ${description}`;

            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText === channelKey) {
                    item.classList.add('active');
                }
            });

            renderMessages();
        }

        function addLike(index) {
            blogData[currentChannel][index].likes += 1;
            document.getElementById(`like-count-${index}`).innerText = blogData[currentChannel][index].likes;
        }

        // Muat pertama kali
        renderMessages();
    </script>
</body>
    </html>
