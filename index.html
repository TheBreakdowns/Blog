<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .bg-discord-dark { background-color: #202225; }
        .bg-discord-sidebar { background-color: #2f3136; }
        .bg-discord-main { background-color: #36393f; }
        .bg-discord-blurple { background-color: #5865F2; }
        .text-discord-muted { color: #b9bbbe; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-discord-dark text-white font-sans flex flex-col md:flex-row min-h-screen w-full overflow-x-hidden">

    <!-- SIDEBAR LEFT -->
    <div class="hidden md:flex w-60 bg-discord-sidebar flex-col justify-between flex-shrink-0 border-r border-zinc-800 min-h-screen sticky top-0">
        <div>
            <div class="h-12 border-b border-zinc-800 flex items-center px-4 font-bold shadow-sm text-sm uppercase tracking-wider truncate">🌐 Breakdowns Blog</div>
            <div class="p-2 space-y-1" id="desktop-menu">
                <button onclick="switchRoom('welcome-links')" class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-sm font-medium transition-colors text-left bg-zinc-700 text-white"># welcome-links</button>
                <button onclick="switchRoom('gaming')" class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-sm font-medium transition-colors text-left text-discord-muted hover:bg-zinc-700/50 hover:text-white"># gaming</button>
                <button onclick="switchRoom('music')" class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-sm font-medium transition-colors text-left text-discord-muted hover:bg-zinc-700/50 hover:text-white"># music</button>
                <button onclick="switchRoom('coding')" class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-sm font-medium transition-colors text-left text-discord-muted hover:bg-zinc-700/50 hover:text-white"># coding</button>
            </div>
        </div>
        <div class="p-2 bg-[#292b2f] text-center text-xs text-discord-muted">Hafitz #0001</div>
    </div>

    <!-- AREA UTAMA -->
    <div class="flex-1 bg-discord-main flex flex-col min-w-0 min-h-full">
        <div class="p-4 space-y-5 pb-32" id="content-area">
            <!-- Isi konten akan berubah otomatis di sini -->
            <div id="view-welcome-links">
                <h1 class="text-xl font-bold">Hafitz P. H. A. S.</h1>
                <p class="text-sm text-discord-muted mb-4">| Tempat nongkrong & link sosmed resmi.</p>
                <div class="space-y-2">
                    <!-- Semua link sosmed lu taruh di sini -->
                    <div class="bg-[#2f3136] p-3 rounded flex justify-between items-center"><span>Instagram</span><a href="https://www.instagram.com/hftzphas" class="bg-discord-blurple px-3 py-1 rounded text-xs">Open</a></div>
                    <div class="bg-[#2f3136] p-3 rounded flex justify-between items-center"><span>GitHub</span><a href="https://github.com/breakdowns" class="bg-discord-blurple px-3 py-1 rounded text-xs">Open</a></div>
                    <!-- Tambahin link lainnya di sini ya -->
                </div>
            </div>
            <div id="view-blog" class="hidden"></div>
        </div>
    </div>

    <script>
        const blogData = {
            gaming: [{ title: "Review ML", content: "Meta sekarang chaos...", emoji: "🎮", react: 24 }],
            music: [{ title: "Spotify List", content: "Lagi dengerin metalcore...", emoji: "🎵", react: 15 }],
            coding: [{ title: "Dev Log", content: "Sukses bikin sistem SPA!", emoji: "💻", react: 10 }]
        };

        function switchRoom(room) {
            const contentArea = document.getElementById('view-blog');
            const welcomeArea = document.getElementById('view-welcome-links');
            
            if(room === 'welcome-links') {
                welcomeArea.classList.remove('hidden');
                contentArea.classList.add('hidden');
            } else {
                welcomeArea.classList.add('hidden');
                contentArea.classList.remove('hidden');
                const posts = blogData[room];
                contentArea.innerHTML = posts.map(p => `
                    <div class="bg-[#2f3136] p-4 rounded">
                        <h2 class="font-bold text-discord-blurple">${p.title}</h2>
                        <p class="text-sm mt-2">${p.content}</p>
                        <div class="mt-3 text-xs">${p.emoji} ${p.react}</div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
